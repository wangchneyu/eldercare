server:
  port: 9999

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # ==================== HTTP 路由 (8 组) ====================

        # 鉴权服务 — 登录/注册/刷新 Token
        - id: route-auth
          uri: lb://service-auth
          predicates:
            - Path=/auth/**

        # 管理后台 — 运营管理
        - id: route-admin
          uri: lb://service-operation
          predicates:
            - Path=/admin/**

        # 服务端 — IoT 设备管理
        - id: route-server
          uri: lb://service-iot
          predicates:
            - Path=/server/**

        # 老人端 — 体征/照护/AI
        - id: route-elderly
          uri: lb://service-care
          predicates:
            - Path=/elderly/**

        # 家属端 — 关怀/通知
        - id: route-family
          uri: lb://service-family
          predicates:
            - Path=/family/**

        # 生命体征 — 体征数据查询/录入
        - id: route-vital
          uri: lb://service-vital
          predicates:
            - Path=/vital/**

        # AI 推理 — 智能服务/ASR/TTS
        - id: route-ai
          uri: lb://service-ai
          predicates:
            - Path=/ai/**

        # 告警服务 — SOS 预警/核销查询
        - id: route-alert
          uri: lb://service-alert
          predicates:
            - Path=/alert/**

        # ==================== WebSocket 路由 (2 组) ====================

        # 告警实时推送（SOS 状态变更）
        - id: ws-alert
          uri: lb:ws://service-alert
          predicates:
            - Path=/ws/alert/**

        # 家属生活推送（日报/活动通知）
        - id: ws-family-living
          uri: lb:ws://service-family
          predicates:
            - Path=/ws/family-living/**

    sentinel:
      transport:
        dashboard: 127.0.0.1:8080
      eager: true

# ==================== 安全配置 ====================
eldercare:
  security:
    enabled: true
    secret: ElderCarePlatform2024SecretKey!@#$%^
    access-token-expiration: 7200
    refresh-token-expiration: 604800

    # CORS 跨域配置
    cors:
      allowed-origin-patterns:
        - "*"  # 开发环境使用通配符，生产环境改为具体域名列表
      max-age: 3600

    # RBAC 角色-路径映射（用户需拥有所列角色之一方可访问匹配路径）
    role-mappings:
      # 管理后台 — 运营管理
      - paths:
          - /admin/**
        roles:
          - ADMIN
          - OPERATOR
      # 服务端 — IoT 设备管理
      - paths:
          - /server/**
        roles:
          - ADMIN
          - OPERATOR
          - CAREGIVER
      # 老人端 — 体征/照护/AI
      - paths:
          - /elderly/**
        roles:
          - ADMIN
          - CAREGIVER
      # 家属端 — 关怀/通知
      - paths:
          - /family/**
        roles:
          - ADMIN
          - FAMILY
      # 家属生活推送 WebSocket
      - paths:
          - /ws/family-living/**
        roles:
          - ADMIN
          - FAMILY
      # /ws/alert/** 不在此配置 → 所有已认证用户均可访问
      # 生命体征 — 体征数据
      - paths:
          - /vital/**
        roles:
          - ADMIN
          - CAREGIVER
          - OPERATOR
      # AI 推理 — 智能服务
      - paths:
          - /ai/**
        roles:
          - ADMIN
          - CAREGIVER
      # 告警服务 — SOS 预警/核销查询
      - paths:
          - /alert/**
        roles:
          - ADMIN
          - CAREGIVER
          - OPERATOR

# ==================== 日志 ====================
logging:
  level:
    com.eldercare.gateway: DEBUG
    com.alibaba.csp.sentinel: INFO