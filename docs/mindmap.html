<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Cloud Alibaba 架构构建流程与原理</title>
<style>
  :root {
    --bg: #0f1119;
    --surface: #161822;
    --border: #252836;
    --text: #c8ccd8;
    --text-dim: #6b7084;
    --accent: #4fc3f7;
    --accent2: #7c4dff;
    --accent3: #69f0ae;
    --accent4: #ffab40;
    --accent5: #ff5252;
    --accent6: #40c4ff;
    --accent7: #ea80fc;
    --glow-1: rgba(79,195,247,0.15);
    --glow-2: rgba(124,77,255,0.15);
    --glow-3: rgba(105,240,174,0.15);
    --font-display: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ---- Background Texture ---- */
  body::before {
    content: '';
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(79,195,247,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 30%, rgba(124,77,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 60% 80%, rgba(105,240,174,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---- Grid Dots ---- */
  .grid-bg {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* ---- Header ---- */
  .header {
    position: fixed;
    top:0; left:0; right:0;
    height: 56px;
    background: rgba(22,24,34,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display:flex;
    align-items:center;
    padding: 0 28px;
    z-index: 100;
    gap: 16px;
  }
  .header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.d1 { background: var(--accent5); }
  .dot.d2 { background: var(--accent4); }
  .dot.d3 { background: var(--accent3); }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent6));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
    letter-spacing: 1px;
  }

  /* ---- Toolbar ---- */
  .toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display:flex;
    gap: 8px;
    z-index: 100;
    background: rgba(22,24,34,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 8px;
  }
  .toolbar button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 18px;
    border-radius: 32px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-display);
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .toolbar button:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }
  .toolbar button.active {
    color: var(--accent);
    background: rgba(79,195,247,0.12);
  }
  .toolbar .divider {
    width: 1px;
    background: var(--border);
    margin: 4px 4px;
    border-radius: 1px;
  }

  /* ---- Map Container ---- */
  .map-container {
    position: fixed;
    top: 56px;
    left:0; right:0; bottom:0;
    z-index: 1;
    cursor: grab;
  }
  .map-container:active {
    cursor: grabbing;
  }
  .map-container.panning { cursor: grabbing; }

  /* ---- SVG Layer ---- */
  .lines-layer {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ---- Nodes Layer ---- */
  .nodes-layer {
    position: absolute;
    top:0; left:0;
    z-index: 2;
    transform-origin: 0 0;
  }

  /* ---- Node Card ---- */
  .node {
    position: absolute;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.3s ease;
    white-space: nowrap;
  }
  .node:hover { z-index: 10; }

  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
    position: relative;
    overflow: hidden;
  }
  .node-card::before {
    content: '';
    position: absolute;
    top:0; left:0; right:0;
    height: 2px;
    border-radius: 2px 2px 0 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .node:hover .node-card {
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 8px 40px rgba(0,0,0,0.45);
    transform: translateY(-2px);
  }

  /* ---- Node Level Styles ---- */
  .node.level-0 .node-card {
    background: linear-gradient(135deg, rgba(79,195,247,0.12), rgba(124,77,255,0.08));
    border-color: rgba(79,195,247,0.3);
    padding: 20px 32px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 0 60px var(--glow-1), 0 4px 32px rgba(0,0,0,0.35);
  }
  .node.level-0:hover .node-card {
    box-shadow: 0 0 80px var(--glow-1), 0 8px 48px rgba(0,0,0,0.5);
  }
  .node.level-0 .node-card::before {
    opacity: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    height: 3px;
  }
  .node.level-0 .label { color: #e8eaef; }

  .node.level-1 .node-card {
    background: rgba(22,24,34,0.95);
    border-color: var(--border);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    min-width: 180px;
    text-align: center;
  }
  .node.level-1:hover .node-card {
    border-color: rgba(79,195,247,0.25);
  }
  .node.level-1 .node-card::before {
    background: var(--accent);
  }
  .node.level-1:hover .node-card::before { opacity: 1; }

  .node.level-2 .node-card {
    background: rgba(22,24,34,0.9);
    border-color: var(--border);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
  }
  .node.level-2:hover .node-card {
    border-color: rgba(124,77,255,0.25);
  }
  .node.level-2 .node-card::before {
    background: var(--accent2);
  }
  .node.level-2:hover .node-card::before { opacity: 1; }

  .node.level-3 .node-card {
    background: rgba(22,24,34,0.85);
    border-color: var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .node.level-3:hover .node-card {
    border-color: rgba(105,240,174,0.2);
    color: var(--text);
  }
  .node.level-3 .node-card::before {
    background: var(--accent3);
  }
  .node.level-3:hover .node-card::before { opacity: 1; }

  .label { position: relative; z-index: 1; }

  /* ---- Collapse Indicator ---- */
  .collapse-indicator {
    display: inline-block;
    width: 18px;
    height: 18px;
    line-height: 18px;
    text-align: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    font-size: 10px;
    margin-left: 6px;
    transition: transform 0.3s ease;
    vertical-align: middle;
    color: var(--text-dim);
  }
  .node.collapsed .collapse-indicator {
    transform: rotate(-90deg);
  }
  .node.leaf .collapse-indicator { display: none; }

  /* ---- Hidden children ---- */
  .node.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
  }

  /* ---- Tooltip ---- */
  .tooltip {
    position: fixed;
    background: rgba(22,24,34,0.97);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s ease;
    max-width: 300px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  .tooltip.visible { opacity: 1; }

  /* ---- Legend ---- */
  .legend {
    position: fixed;
    right: 24px;
    top: 80px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-dot.l0 { background: var(--accent); box-shadow: 0 0 8px rgba(79,195,247,0.5); }
  .legend-dot.l1 { background: var(--accent2); box-shadow: 0 0 6px rgba(124,77,255,0.4); }
  .legend-dot.l2 { background: var(--accent3); box-shadow: 0 0 6px rgba(105,240,174,0.4); }

  /* ---- Responsive ---- */
  @media (max-width: 1024px) {
    .header h1 { font-size: 15px; }
    .node.level-0 .node-card { font-size: 16px; padding: 14px 24px; }
    .node.level-1 .node-card { font-size: 13px; padding: 10px 14px; }
    .node.level-2 .node-card { font-size: 11px; padding: 8px 10px; }
    .node.level-3 .node-card { font-size: 10px; padding: 6px 8px; }
    .toolbar button { padding: 8px 12px; font-size: 11px; }
    .legend { right: 8px; top: 70px; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<header class="header">
  <span class="dot d1"></span>
  <span class="dot d2"></span>
  <span class="dot d3"></span>
  <h1>Spring Cloud Alibaba · 架构构建流程与原理</h1>
  <span class="subtitle">SPRING CLOUD ALIBABA</span>
</header>

<div class="legend">
  <div class="legend-item"><span class="legend-dot l0"></span> 核心模块</div>
  <div class="legend-item"><span class="legend-dot l1"></span> 子模块</div>
  <div class="legend-item"><span class="legend-dot l2"></span> 功能点</div>
</div>

<div class="map-container" id="mapContainer">
  <svg class="lines-layer" id="linesLayer"></svg>
  <div class="nodes-layer" id="nodesLayer"></div>
</div>

<div class="toolbar" id="toolbar">
  <button id="btnExpand" class="active" title="展开全部">展开全部</button>
  <button id="btnCollapse" title="收起">收起至一级</button>
  <span class="divider"></span>
  <button id="btnReset" title="重置视图">重置视图</button>
  <span class="divider"></span>
  <span style="color:var(--text-dim);font-size:11px;padding:10px 8px;">拖拽平移 · 滚轮缩放 · 点击展开</span>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(function() {
  // ---- DATA ----
  const tree = {
    id: 'root',
    label: 'eldercare-platform\n架构构建流程',
    children: [
      {
        id: 'step1',
        label: '① 工程结构设计',
        children: [
          {
            id: 's1-maven',
            label: 'Maven 多模块聚合',
            children: [
              { id:'s1m1', label: '父 POM 统一管理版本', children:[] },
              { id:'s1m2', label: 'dependencyManagement 依赖收敛', children:[] },
              { id:'s1m3', label: 'Spring Boot + Cloud + Alibaba BOM 三合一', children:[] },
              { id:'s1m4', label: '版本锁定：避免依赖冲突', children:[] },
            ]
          },
          {
            id: 's1-module',
            label: '模块划分原则',
            children: [
              { id:'s1d1', label: 'common：可复用基础设施（内部 SDK）', children:[] },
              { id:'s1d2', label: 'gateway：统一入口，与业务解耦', children:[] },
              { id:'s1d3', label: 'service：按业务域拆分（DDD 限界上下文）', children:[] },
              { id:'s1d4', label: '每个 service 独立部署、独立数据库', children:[] },
            ]
          },
        ]
      },
      {
        id: 'step2',
        label: '② 公共模块构建（核心）',
        children: [
          {
            id: 's2-core',
            label: 'common-core：统一基础约定',
            children: [
              { id:'s2c1', label: 'R<T> 统一响应体 → 前端对接标准化', children:[] },
              { id:'s2c2', label: '全局异常处理 → 异常自动转 R 响应', children:[] },
              { id:'s2c3', label: '错误码枚举 → 异常可追溯、可分类', children:[] },
              { id:'s2c4', label: 'TraceContext (MDC) → 日志串联全链路', children:[] },
            ]
          },
          {
            id: 's2-security',
            label: 'common-security：统一安全底座',
            children: [
              { id:'s2s1', label: 'JWT 无状态认证 → 服务不存 session', children:[] },
              { id:'s2s2', label: 'Gateway 全局过滤器 → 入口统一鉴权', children:[] },
              { id:'s2s3', label: '@RequireRole AOP → 方法级权限控制', children:[] },
              { id:'s2s4', label: 'Feign 拦截器 → token 自动透传下游', children:[] },
              { id:'s2s5', label: 'SecurityContextHolder → 当前用户上下文', children:[] },
            ]
          },
          {
            id: 's2-design',
            label: '公共模块设计原理',
            children: [
              { id:'s2d1', label: '零业务耦合：只放横切关注点', children:[] },
              { id:'s2d2', label: '约定优于配置：统一规范降低沟通成本', children:[] },
              { id:'s2d3', label: '按需引入：每个 common-* 独立 jar', children:[] },
              { id:'s2d4', label: 'AutoConfiguration 机制：引入即生效', children:[] },
            ]
          },
        ]
      },
      {
        id: 'step3',
        label: '③ 服务注册与发现（Nacos）',
        children: [
          {
            id: 's3-registry',
            label: 'Nacos 注册中心原理',
            children: [
              { id:'s3r1', label: '服务启动 → 向 Nacos 注册（临时实例）', children:[] },
              { id:'s3r2', label: '心跳保活 5s/次，15s 无心跳剔除', children:[] },
              { id:'s3r3', label: 'Gateway 通过服务名做负载均衡（lb://）', children:[] },
              { id:'s3r4', label: 'AP 模型：优先可用性（适合微服务）', children:[] },
            ]
          },
          {
            id: 's3-config',
            label: 'Nacos 配置中心',
            children: [
              { id:'s3c1', label: '共享配置：所有服务共用的通用配置', children:[] },
              { id:'s3c2', label: '私有配置：各服务独立配置热更新', children:[] },
              { id:'s3c3', label: '@RefreshScope → 配置变更实时生效', children:[] },
            ]
          },
          {
            id: 's3-operation',
            label: '使用方式',
            children: [
              { id:'s3o1', label: '引入 nacos-discovery 依赖', children:[] },
              { id:'s3o2', label: '配置 server-addr + application.name', children:[] },
              { id:'s3o3', label: 'Dashboard: 服务列表 / 健康检查 / 上下线', children:[] },
            ]
          },
        ]
      },
      {
        id: 'step4',
        label: '④ Gateway 统一网关',
        children: [
          {
            id: 's4-route',
            label: '路由机制',
            children: [
              { id:'s4r1', label: '基于 Path 断言匹配（/auth/** → service-auth）', children:[] },
              { id:'s4r2', label: 'lb:// 负载均衡（Ribbon → Spring Cloud LoadBalancer）', children:[] },
              { id:'s4r3', label: 'WebFlux 响应式 → 非阻塞 IO，高吞吐', children:[] },
              { id:'s4r4', label: '也支持 WebSocket 路由（ws 协议透传）', children:[] },
            ]
          },
          {
            id: 's4-filter',
            label: '过滤器链',
            children: [
              { id:'s4f1', label: 'GlobalFilter 全局过滤器（order 控制顺序）', children:[] },
              { id:'s4f2', label: 'JWT 过滤器 order=-100：最先执行鉴权', children:[] },
              { id:'s4f3', label: '解析 token → 设请求头 X-User-Id/Roles', children:[] },
              { id:'s4f4', label: '白名单路径直接放行，不校验 token', children:[] },
            ]
          },
        ]
      },
      {
        id: 'step5',
        label: '⑤ Sentinel 流量治理',
        children: [
          {
            id: 's5-flow',
            label: '网关层限流',
            children: [
              { id:'s5f1', label: '按路由组限流（SentinelGatewayConfig）', children:[] },
              { id:'s5f2', label: 'QPS 阈值：超限返回 429 或降级响应', children:[] },
              { id:'s5f3', label: 'eager=true → 启动即加载规则（防止冷启动雪崩）', children:[] },
            ]
          },
          {
            id: 's5-degrade',
            label: '服务层熔断降级',
            children: [
              { id:'s5d1', label: '@SentinelResource 标记资源点', children:[] },
              { id:'s5d2', label: 'blockHandler → 限流/熔断后走降级逻辑', children:[] },
              { id:'s5d3', label: 'Sentinel Dashboard 实时监控 + 动态改规则', children:[] },
            ]
          },
        ]
      },
    ]
  };

  // ---- LAYOUT ENGINE (left-to-right tree, two-pass) ----
  const SIBLING_GAP = 12;  // vertical gap between siblings
  const LEVEL_GAP = 50;    // horizontal gap between levels
  const PAD = { 0: [28,52], 1: [16,32], 2: [10,20], 3: [6,14] };

  function getDims(level, label) {
    var lines = label.split('\n');
    var maxChars = 0;
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].length > maxChars) maxChars = lines[i].length;
    }
    var cw = level === 0 ? 22 : level === 1 ? 17 : level === 2 ? 14 : 12;
    var lh = level === 0 ? 28 : level === 1 ? 22 : level === 2 ? 18 : 16;
    var p = PAD[level] || PAD[3];
    return {
      w: Math.max(maxChars * cw + p[1] * 2, level === 0 ? 280 : level === 1 ? 190 : 110),
      h: lines.length * lh + p[0] * 2
    };
  }

  var nodePositions = {};
  var collapsed = new Set();
  var svgLines = [];

  // Cache: for each node, store the total subtree height
  var heightCache = {};

  // Pass 1: measure subtree heights (bottom-up)
  function measureHeight(node, level) {
    if (collapsed.has(node.id)) { var d = getDims(level, node.label); heightCache[node.id] = d.h; return d.h; }
    if (!node.children || node.children.length === 0) {
      var d = getDims(level, node.label);
      heightCache[node.id] = d.h;
      return d.h;
    }
    var total = 0;
    for (var i = 0; i < node.children.length; i++) {
      total += measureHeight(node.children[i], level + 1);
      if (i < node.children.length - 1) total += SIBLING_GAP;
    }
    var selfH = getDims(level, node.label).h;
    heightCache[node.id] = Math.max(selfH, total);
    return heightCache[node.id];
  }

  // Pass 2: assign coordinates (top-down, left-to-right)
  function placeNodes(node, level, x, y) {
    var dims = getDims(level, node.label);
    var th = heightCache[node.id];

    // Center self vertically within its subtree height
    var sy = y + (th - dims.h) / 2;

    nodePositions[node.id] = { id: node.id, x: x, y: sy, w: dims.w, h: dims.h, level: level, label: node.label };

    if (!node.children || node.children.length === 0 || collapsed.has(node.id)) return;

    // Calculate children total height
    var childrenTotalH = 0;
    for (var i = 0; i < node.children.length; i++) {
      childrenTotalH += heightCache[node.children[i].id];
      if (i < node.children.length - 1) childrenTotalH += SIBLING_GAP;
    }

    // Children start vertically centered within my subtree
    var cy = y + (th - childrenTotalH) / 2;
    var cx = x + dims.w + LEVEL_GAP;

    for (var i = 0; i < node.children.length; i++) {
      var child = node.children[i];
      placeNodes(child, level + 1, cx, cy);

      // Draw connecting line (bezier-like: horizontal from parent right edge, then curve)
      svgLines.push({
        x1: x + dims.w,
        y1: sy + dims.h / 2,
        x2: cx,
        y2: nodePositions[child.id].y + nodePositions[child.id].h / 2,
        level: level
      });
      cy += heightCache[child.id] + SIBLING_GAP;
    }
  }

  function layout() {
    nodePositions = {};
    svgLines = [];
    heightCache = {};
    measureHeight(tree, 0);
    placeNodes(tree, 0, 0, 0);
    return nodePositions;
  }

  // ---- RENDER ----
  const nodesLayer = document.getElementById('nodesLayer');
  const linesLayer = document.getElementById('linesLayer');
  const tooltip = document.getElementById('tooltip');

  function renderLines() {
    var colors = ['rgba(79,195,247,0.45)', 'rgba(124,77,255,0.3)', 'rgba(105,240,174,0.25)', 'rgba(255,255,255,0.1)'];
    var widths = [2.5, 1.8, 1.2, 0.8];
    var html = '';
    for (var i = 0; i < svgLines.length; i++) {
      var L = svgLines[i];
      var c = colors[Math.min(L.level, colors.length - 1)];
      var w = widths[Math.min(L.level, widths.length - 1)];
      var mx = L.x1 + (L.x2 - L.x1) * 0.5;
      // Smooth bezier: horizontal from parent, curve to child
      var d = 'M' + L.x1 + ',' + L.y1 + ' C' + mx + ',' + L.y1 + ' ' + mx + ',' + L.y2 + ' ' + L.x2 + ',' + L.y2;
      html += '<path d="' + d + '" fill="none" stroke="' + c + '" stroke-width="' + w + '" stroke-linecap="round"/>';
    }
    linesLayer.innerHTML = '<svg width="100%" height="100%" style="position:absolute;top:0;left:0;">' + html + '</svg>';
  }

  function renderNodes() {
    let html = '';
    for (const [id, pos] of Object.entries(nodePositions)) {
      const hasChildren = treeHasChildren(id);
      const isCollapsedNode = collapsed.has(id);
      html += `
        <div class="node level-${pos.level}${hasChildren ? '' : ' leaf'}${isCollapsedNode ? ' collapsed' : ''}"
             id="node-${id}"
             style="left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;"
             data-id="${id}"
             data-level="${pos.level}">
          <div class="node-card">
            <span class="label">${escapeHtml(pos.label)}</span>
            ${hasChildren ? `<span class="collapse-indicator">▼</span>` : ''}
          </div>
        </div>`;
    }
    nodesLayer.innerHTML = html;

    // Bind events
    document.querySelectorAll('.node').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleNode(el.dataset.id);
      });
      el.addEventListener('mouseenter', (e) => {
        showTooltip(e, el.dataset.id);
      });
      el.addEventListener('mouseleave', hideTooltip);
    });
  }

  function treeHasChildren(id) {
    function find(node) {
      if (node.id === id) return node.children && node.children.length > 0;
      if (node.children) {
        for (const c of node.children) {
          const r = find(c);
          if (r !== undefined) return r;
        }
      }
      return undefined;
    }
    const r = find(tree);
    return r === true;
  }

  function findNode(id) {
    function f(node) {
      if (node.id === id) return node;
      if (node.children) {
        for (const c of node.children) {
          const r = f(c);
          if (r) return r;
        }
      }
      return null;
    }
    return f(tree);
  }

  function getAllDescendantIds(node) {
    const ids = [];
    function collect(n) {
      ids.push(n.id);
      if (n.children) n.children.forEach(collect);
    }
    if (node.children) node.children.forEach(collect);
    return ids;
  }

  function toggleNode(id) {
    const node = findNode(id);
    if (!node || !node.children || node.children.length === 0) return;

    if (collapsed.has(id)) {
      collapsed.delete(id);
    } else {
      // Collect all descendants to hide
      const descIds = getAllDescendantIds(node);
      collapsed.add(id);
      // Also clean up collapsed state for descendants
      for (const did of descIds) {
        collapsed.delete(did); // they won't be visible anyway
      }
    }
    rebuild();
  }

  function collapseAll() {
    collapsed.clear();
    // Collapse all level-1 nodes
    if (tree.children) {
      for (const c of tree.children) {
        collapsed.add(c.id);
      }
    }
    rebuild();
  }

  function expandAll() {
    collapsed.clear();
    rebuild();
  }

  function rebuild() {
    layout();
    renderLines();
    renderNodes();
    updateToolbarButtons();
  }

  function updateToolbarButtons() {
    const btnExpand = document.getElementById('btnExpand');
    const btnCollapse = document.getElementById('btnCollapse');
    if (collapsed.size === 0) {
      btnExpand.classList.add('active');
      btnCollapse.classList.remove('active');
    } else {
      btnExpand.classList.remove('active');
    }
  }

  function showTooltip(e, id) {
    const pos = nodePositions[id];
    if (!pos) return;
    const node = findNode(id);
    if (!node) return;
    const childCount = node.children ? node.children.length : 0;
    if (childCount === 0) {
      hideTooltip();
      return;
    }

    const collapsedText = collapsed.has(id) ? `（已折叠 — 点击展开 ${childCount} 个子节点）` : `（点击折叠 — ${childCount} 个子节点）`;
    tooltip.textContent = collapsedText;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
  }

  // ---- PANNING & ZOOMING ----
  const mapContainer = document.getElementById('mapContainer');
  let scale = 1;
  let panX = 0, panY = 0;
  let isPanning = false;
  let startX, startY, startPanX, startPanY;

  function applyTransform() {
    nodesLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    linesLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  mapContainer.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node')) return; // ignore node clicks
    isPanning = true;
    mapContainer.classList.add('panning');
    startX = e.clientX;
    startY = e.clientY;
    startPanX = panX;
    startPanY = panY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    panX = startPanX + (e.clientX - startX);
    panY = startPanY + (e.clientY - startY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    isPanning = false;
    mapContainer.classList.remove('panning');
  });

  mapContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(scale * delta, 0.3), 2.5);
    // Zoom towards cursor
    const rect = mapContainer.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const ratio = newScale / scale;
    panX = cx - ratio * (cx - panX);
    panY = cy - ratio * (cy - panY);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  // ---- INITIAL CENTERING ----
  function centerRoot() {
    layout();
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var id in nodePositions) {
      var p = nodePositions[id];
      if (p.x < minX) minX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.x + p.w > maxX) maxX = p.x + p.w;
      if (p.y + p.h > maxY) maxY = p.y + p.h;
    }
    var treeW = maxX - minX;
    var treeH = maxY - minY;
    var viewW = window.innerWidth;
    var viewH = window.innerHeight - 56;
    // Scale to fit vertically, clamp between 0.25 and 1
    scale = Math.min(Math.max((viewH - 100) / treeH, 0.35), 1);
    // Center the tree root node vertically, with left margin
    var rp = nodePositions['root'];
    panX = 60;
    panY = viewH / 2 - (rp.y + rp.h / 2) * scale;
    applyTransform();
  }

  // ---- BUTTONS ----
  document.getElementById('btnExpand').addEventListener('click', expandAll);
  document.getElementById('btnCollapse').addEventListener('click', collapseAll);
  document.getElementById('btnReset').addEventListener('click', () => {
    scale = 1;
    expandAll();
    setTimeout(centerRoot, 100);
  });

  // ---- KEYBOARD ----
  window.addEventListener('keydown', (e) => {
    switch(e.key.toLowerCase()) {
      case 'e': expandAll(); break;
      case 'c': collapseAll(); break;
      case 'r': scale = 1; expandAll(); setTimeout(centerRoot, 100); break;
      case '0': scale = 1; panX = 0; panY = 0; applyTransform(); break;
    }
  });

  // ---- INIT ----
  layout();
  renderLines();
  renderNodes();
  setTimeout(centerRoot, 50);

  // ---- Resize ----
  window.addEventListener('resize', () => {
    rebuild();
    setTimeout(centerRoot, 50);
  });

  console.log('🏥 eldercare-platform 思维导图已就绪');
  console.log('  拖拽平移 | 滚轮缩放 | 点击折叠/展开');
  console.log('  快捷键: E=展开全部 C=收起至一级 R=重置视图');
})();
</script>
</body>
</html>
